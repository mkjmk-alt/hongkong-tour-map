        #map { border-radius: 16px; border: 1px solid var(--border); box-shadow: var(--shadow); z-index: 1; }

                const d = await r.json(); resDiv.innerHTML = '';
                if (d.length === 0) { resDiv.innerHTML = `<div class="search-result-item" style="color:#e74c3c">결과 없음</div><div class="search-result-item" onclick="window.open('https://www.google.com/maps/search/${encodeURIComponent(q)}')">🔍 구글지도 찾기</div>`; }
                else { d.forEach(i => { const div = document.createElement('div'); div.className = 'search-result-item'; div.innerText = i.display_name.split(',').slice(0,3).join(','); div.onclick = () => { showAddPopup(i.lat, i.lon, i.display_name.split(',')[0]); resDiv.style.display = 'none'; }; resDiv.appendChild(div); }); }
            } catch (e) { resDiv.innerHTML = '<div class="search-result-item">에러 발생</div>'; }
        };

        function showAddPopup(lat, lon, name) { L.marker([lat, lon], { icon: getIcon('violet') }).addTo(map).bindPopup(`<div style="width:200px"><input type="text" id="custom-name" value="${name}" style="width:100%;margin-bottom:8px;padding:5px"><button onclick="addCustomLocation(${lat},${lon},'📍')" style="width:100%;padding:8px;background:var(--primary);color:white;border:none;border-radius:6px;cursor:pointer">+ 일정 추가</button></div>`).openPopup(); map.flyTo([lat, lon], 16); }
        window.addCustomLocation = (lat, lon, e) => { const n = document.getElementById('custom-name').value.trim() || "지정한 위치"; window.addItem({ name: n, lat: lat, lng: lon }, e); map.closePopup(); };
        let pressTimer; map.on('mousedown', (e) => { pressTimer = setTimeout(() => showAddPopup(e.latlng.lat, e.latlng.lng, "새로운 장소"), 2000); }); map.on('mouseup mousemove dragstart zoomstart', () => clearTimeout(pressTimer));

        let itinerary = JSON.parse(localStorage.getItem('hk_itinerary')) || [[]], activeDay = 0;
        function save() { localStorage.setItem('hk_itinerary', JSON.stringify(itinerary)); pushToSupabase(); }
        async function pushToSupabase() { if (!syncId) return; await sbClient.from('itineraries').upsert({ id: syncId, data: itinerary, updated_at: new Date() }); document.getElementById('status-dot').classList.add('online'); }
        async function startSync() {
            syncId = document.getElementById('sync-code').value.trim().toLowerCase(); if (!syncId) return;
            localStorage.setItem('hk_sync_id', syncId);
            const { data } = await sbClient.from('itineraries').select('data').eq('id', syncId).single();
            if (data && data.data) { if (confirm('기존 일정을 불러올까요?')) { itinerary = data.data; renderPlanner(); } }
            document.getElementById('status-dot').classList.add('online');
            sbClient.channel('sync').on('postgres_changes', { event: 'UPDATE', schema: 'public', table: 'itineraries', filter: `id=eq.${syncId}` }, p => { if (!isSyncingFromRemote) { itinerary = p.new.data; renderPlanner(); } }).subscribe();
        }

        function drawRoutes() {
            polylines.forEach(p => map.removeLayer(p)); polylines = []; if (!showRoutes) return;
            const colors = ['#d35400', '#3498db', '#27ae60', '#8e44ad', '#e74c3c', '#f1c40f']; const d = itinerary[activeDay];
            if (d) { const c = d.filter(i => i.lat && i.lng).map(i => [i.lat, i.lng]); if (c.length > 1) polylines.push(L.polyline(c, { color: colors[activeDay % colors.length], weight: 4, opacity: 0.8, dashArray: '10,10' }).addTo(map)); }
        }
        window.toggleRoutes = () => { showRoutes = !showRoutes; document.getElementById('toggle-route').innerText = showRoutes ? "경로 숨기기" : "경로 보이기"; drawRoutes(); };

        function renderPlanner() {
            isSyncingFromRemote = true; const container = document.getElementById('planner-content'); container.innerHTML = '';
            const startDate = new Date(2026, 3, 3), weekDays = ['일', '월', '화', '수', '목', '금', '토'];
            itinerary.forEach((day, idx) => {
                const d = new Date(startDate); d.setDate(startDate.getDate() + idx);
                const box = document.createElement('div'); box.className = `day-box ${idx === activeDay ? 'active' : ''}`;
                box.innerHTML = `<div class="day-head ${idx === activeDay ? 'active' : ''}" onclick="activeDay=${idx};renderPlanner()"><span>Day ${idx + 1} <small>${d.getMonth() + 1}/${d.getDate()}(${weekDays[d.getDay()]})</small></span></div><div class="day-list" data-idx="${idx}"></div>`;
                container.appendChild(box); const list = box.querySelector('.day-list');
                day.forEach((item, iIdx) => {
                    const el = document.createElement('div'); el.className = 'plan-item';
                    el.innerHTML = `<span class="plan-item-name" onclick="focusLoc('${item.fullName}')">${item.name}</span><button class="plan-item-del" onclick="removeItem(${idx}, ${iIdx})">×</button>`;
                    list.appendChild(el);
                });
                new Sortable(list, { group: 'itinerary', animation: 150, onEnd: evt => {
                    const [moved] = itinerary[parseInt(evt.from.dataset.idx)].splice(evt.oldIndex, 1);
                    itinerary[parseInt(evt.to.dataset.idx)].splice(evt.newIndex, 0, moved); save(); renderPlanner();
                }});
            });
            drawRoutes(); isSyncingFromRemote = false;
        }

        window.addDay = () => { itinerary.push([]); activeDay = itinerary.length - 1; save(); renderPlanner(); };
        window.removeItem = (d, i) => { itinerary[d].splice(i, 1); save(); renderPlanner(); };
        window.clearPlanner = () => { if(confirm('초기화할까요?')) { itinerary = [[]]; activeDay = 0; save(); renderPlanner(); }};
        window.addItem = (item, emoji) => { itinerary[activeDay].push({ name: `${emoji} ${item.name}`, fullName: item.name, lat: item.lat, lng: item.lng }); save(); renderPlanner(); };
        window.focusLoc = name => { const m = markers[name]; if (m) { map.flyTo(m.getLatLng(), 16); setTimeout(() => m.openPopup(), 500); } };
        window.addItemFromPopup = (name, emoji) => { let item = null; for (const cat of Object.values(allData)) { item = cat.items.find(i => i.name === name); if (item) break; } if (item) window.addItem(item, emoji); };

        const anchor = document.getElementById('lists-anchor');
        Object.entries(allData).forEach(([key, group]) => {
            const h2 = document.createElement('h2'); h2.className = 'section-title'; h2.innerText = group.title; anchor.appendChild(h2);
            const grid = document.createElement('div'); grid.className = 'list-grid'; anchor.appendChild(grid);
            group.items.forEach(item => {
                const marker = L.marker([item.lat, item.lng], { icon: getIcon(group.color) }).addTo(map).bindPopup(`<div style="width:200px"><b>${item.name}</b><br><small>${item.cat}</small><hr style="margin:8px 0;border:0;border-top:1px solid #eee">${item.desc}<div style="display:flex;flex-direction:column;gap:8px;margin-top:10px"><button onclick="window.addItemFromPopup('${item.name.replace(/'/g, "\\'")}', '${group.emoji}')" style="width:100%;padding:8px;background:var(--primary);color:white;border:none;border-radius:6px;font-weight:700;cursor:pointer">+ 일정 추가</button><a href="https://www.google.com/maps/search/?api=1&query=${item.lat},${item.lng}" target="_blank" style="display:flex;align-items:center;justify-content:center;padding:8px;background:#3498db;color:white;text-decoration:none;border-radius:6px;font-size:0.8rem;font-weight:700">📍 길찾기</a></div></div>`);
                markers[item.name] = marker;
                const card = document.createElement('div'); card.className = `card`;
                const borderColors = { black: '#000', violet: '#8e44ad', grey: '#7f8c8d', gold: '#f1c40f', orange: '#ff9800', red: '#e74c3c', blue: '#3498db', green: '#27ae60' };
                card.style.borderLeft = `4px solid ${borderColors[group.color] || '#3498db'}`;
                card.onclick = () => focusLoc(item.name);
                card.innerHTML = `<div class="card-name">${item.name}</div><div class="card-loc">📍 ${item.loc}</div><div class="card-desc">${item.desc}</div><button class="btn-plus" onclick="event.stopPropagation();addItem(${JSON.stringify(item).replace(/"/g, '&quot;')}, '${group.emoji}')">+ 추가</button>`;
                grid.appendChild(card);
            });
        });
        if (syncId) { document.getElementById('sync-code').value = syncId; startSync(); }
        renderPlanner();
    </script>
</body>
</html>
