<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>홍콩 여행 대동여지도 (150선 + 플래너)</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>
    <style>
        :root {
            --primary: #d35400;
            --secondary: #34495e;
            --accent: #e67e22;
            --bg: #f8fafc;
            --border: #e2e8f0;
            --shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1);
        }

        body { font-family: 'Pretendard', system-ui, sans-serif; margin: 0; background: var(--bg); color: #1e293b; line-height: 1.5; }
        .container { max-width: 1400px; margin: 0 auto; padding: 20px; }
        
        header { text-align: center; padding: 40px 20px; background: white; border-bottom: 1px solid var(--border); margin-bottom: 30px; }
        h1 { color: var(--primary); margin: 0; font-size: 2rem; letter-spacing: -0.025em; }
        .subtitle { color: #64748b; margin-top: 8px; font-size: 1rem; }

        .legend { display: flex; justify-content: center; flex-wrap: wrap; gap: 10px; margin-bottom: 30px; }
        .legend-item { display: flex; align-items: center; gap: 6px; padding: 6px 12px; background: white; border-radius: 99px; font-size: 0.85rem; font-weight: 600; border: 1px solid var(--border); box-shadow: var(--shadow); }
        .dot { width: 10px; height: 10px; border-radius: 50%; }

        .main-layout { display: grid; grid-template-columns: 1fr 360px; gap: 24px; height: 700px; margin-bottom: 50px; }
        #map { border-radius: 16px; border: 1px solid var(--border); box-shadow: var(--shadow); z-index: 1; }
        
        .planner { background: white; border-radius: 16px; border: 1px solid var(--border); display: flex; flex-direction: column; overflow: hidden; box-shadow: var(--shadow); }
        .planner-header { padding: 16px; background: #fff; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
        .planner-content { flex: 1; overflow-y: auto; padding: 16px; background: #f1f5f9; }
        .btn-add { background: var(--secondary); color: white; border: none; padding: 6px 12px; border-radius: 6px; font-weight: 600; cursor: pointer; font-size: 0.8rem; }
        .btn-clear { width: 100%; padding: 10px; border: none; background: #fee2e2; color: #dc2626; font-weight: 700; cursor: pointer; }

        .day-box { background: white; border-radius: 12px; border: 1px solid var(--border); margin-bottom: 16px; overflow: hidden; }
        .day-box.active { border-color: var(--accent); ring: 2px var(--accent); }
        .day-head { padding: 12px; background: #f8fafc; cursor: pointer; display: flex; justify-content: space-between; font-weight: 700; border-bottom: 1px solid var(--border); }
        .day-head.active { background: var(--accent); color: white; }
        .day-list { padding: 10px; min-height: 60px; }
        
        .plan-item { background: white; border: 1px solid var(--border); padding: 10px; margin-bottom: 8px; border-radius: 8px; display: flex; align-items: center; gap: 8px; font-size: 0.9rem; cursor: grab; }
        .plan-item-name { flex: 1; font-weight: 600; }
        .plan-item-del { color: #cbd5e1; border: none; background: none; font-size: 1.2rem; cursor: pointer; }
        .plan-item-del:hover { color: #ef4444; }

        .section-title { font-size: 1.5rem; font-weight: 800; margin: 40px 0 20px; border-left: 4px solid var(--primary); padding-left: 12px; }
        .list-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px; }
        .card { background: white; padding: 20px; border-radius: 16px; border: 1px solid var(--border); position: relative; transition: transform 0.2s; cursor: pointer; }
        .card:hover { transform: translateY(-4px); box-shadow: 0 10px 15px -3px rgb(0 0 0 / 0.1); }
        .card-name { font-size: 1.1rem; font-weight: 700; margin-bottom: 4px; padding-right: 70px; }
        .card-loc { font-size: 0.85rem; color: #64748b; font-weight: 600; display: flex; align-items: center; gap: 4px; margin-bottom: 8px; }
        .card-desc { font-size: 0.85rem; color: #475569; line-height: 1.5; display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden; }
        .btn-plus { position: absolute; top: 20px; right: 20px; background: var(--secondary); color: white; border: none; border-radius: 6px; padding: 4px 10px; font-size: 0.75rem; font-weight: 700; }

        @media (max-width: 1024px) {
            .main-layout { grid-template-columns: 1fr; height: auto; }
            #map { height: 400px; }
            .planner { height: 500px; }
        }
    </style>
</head>
<body>
    <header>
        <h1>🇭🇰 홍콩 여행 대동여지도</h1>
        <p class="subtitle">150곳의 명소와 맛집을 드래그해서 나만의 일정을 만들어보세요.</p>
    </header>

    <div class="container">
        <div class="legend">
            <div class="legend-item"><div class="dot" style="background:#8e44ad"></div>🏨 숙소</div>
            <div class="legend-item"><div class="dot" style="background:#f1c40f"></div>📸 명소</div>
            <div class="legend-item"><div class="dot" style="background:#ff9800"></div>🥚 타르트</div>
            <div class="legend-item"><div class="dot" style="background:#e74c3c"></div>🥟 맛집</div>
            <div class="legend-item"><div class="dot" style="background:#3498db"></div>🇰🇷 핫플</div>
            <div class="legend-item"><div class="dot" style="background:#27ae60"></div>🥢 누들</div>
        </div>

        <div class="main-layout">
            <div id="map"></div>
            <div class="planner">
                <div class="planner-header">
                    <h3>🗓️ 나의 일정</h3>
                    <button class="btn-add" onclick="addDay()">+ 일수 추가</button>
                </div>
                <div class="planner-content" id="planner-content"></div>
                <button class="btn-clear" onclick="clearPlanner()">모든 일정 초기화</button>
            </div>
        </div>

        <div id="lists-anchor"></div>
    </div>

    <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
    <script>
        // --- Data ---
        const allData = {
            tours: { title: "📸 필수 관광지 & 포토스팟", color: "#f1c40f", items: [
                { name: "홍콩 디즈니랜드", lat: 22.3130, lng: 114.0413, loc: "란타우 섬", cat: "테마파크", desc: "환상적인 캐릭터들과 어트랙션, 야간 불꽃놀이가 펼쳐지는 홍콩 여행의 필수 코스입니다." },
                { name: "오션파크 홍콩", lat: 22.2460, lng: 114.1747, loc: "남구", cat: "테마파크", desc: "해안 롤러코스터와 아쿠아리움, 판다를 한 번에 만날 수 있는 종합 엔터테인먼트 파크입니다." },
                { name: "빅토리아 피크", lat: 22.2759, lng: 114.1455, loc: "피크", cat: "전망대", desc: "세계 3대 야경으로 꼽히는 홍콩 최고의 조망 스팟. 피크트램을 타고 올라가보세요." },
                { name: "스타페리 선착장", lat: 22.2936, lng: 114.1686, loc: "침사추이", cat: "페리/야경", desc: "가장 저렴하고 로맨틱하게 홍콩섬과 구룡반도를 오가는 역사적인 페리입니다." },
                { name: "미드레벨 에스컬레이터", lat: 22.2826, lng: 114.1549, loc: "센트럴", cat: "포토스팟", desc: "영화 '중경삼림'의 배경이 된 세계 최장의 옥외 에스컬레이터입니다." },
                { name: "익청빌딩", lat: 22.2842, lng: 114.2123, loc: "쿼리베이", cat: "포토스팟", desc: "영화 '트랜스포머' 촬영지로 홍콩의 압도적인 인구 밀도를 보여주는 건물입니다." },
                { name: "초이홍 아파트", lat: 22.3353, lng: 114.2040, loc: "웡타이신", cat: "포토스팟", desc: "무지개 빛깔 외벽과 농구코트가 아름다운 홍콩 최고의 인스타 명소입니다." },
                { name: "란콰이퐁 (LKF)", lat: 22.2807, lng: 114.1554, loc: "센트럴", cat: "나이트라이프", desc: "수많은 펍과 클럽이 모여있는 홍콩 밤문화의 중심지입니다." },
                { name: "소호 (SoHo)", lat: 22.2824, lng: 114.1524, loc: "센트럴", cat: "거리/쇼핑", desc: "트렌디한 벽화와 감성 카페, 부티크 숍들이 가득한 가장 힙한 골목입니다." },
                { name: "옹핑 360 케이블카", lat: 22.2559, lng: 113.9014, loc: "란타우 섬", cat: "케이블카", desc: "바닥이 투명한 캐빈을 타고 바다와 산을 건너는 짜릿한 경험을 선사합니다." }
            ]},
            tarts: { title: "🥚 에그타르트 전역 명점", color: "#ff9800", items: [
                { name: "해시태그 B (Hashtag B)", lat: 22.2988, lng: 114.1722, loc: "침사추이", cat: "나폴레옹 타르트", desc: "요즘 가장 핫한 꽃 모양의 바삭한 페이스트리 타르트 명점입니다." },
                { name: "베이크하우스 (Bakehouse)", lat: 22.2831, lng: 114.1544, loc: "센트럴", cat: "사워도우 타르트", desc: "전 포시즌스 파티시에가 만드는 사워도우 베이스의 겉바속촉 타르트입니다." },
                { name: "타이청 베이커리", lat: 22.2829, lng: 114.1542, loc: "센트럴", cat: "쿠키 도우 타르트", desc: "홍콩식 에그타르트의 근본. 버터 향 가득한 쿠키 도우가 일품입니다." },
                { name: "호놀룰루 커피 숍", lat: 22.2775, lng: 114.1740, loc: "완차이", cat: "페이스트리", desc: "192겹의 바삭한 층이 예술인 정통 에그타르트 노포입니다." }
            ]},
            foods: { title: "🥟 필수 로컬 맛집", color: "#e74c3c", items: [
                { name: "팀호완 (Tim Ho Wan)", lat: 22.3300, lng: 114.1600, loc: "삼수이포", cat: "딤섬", desc: "가장 저렴한 미슐랭 스타 딤섬. BBQ 포크번은 반드시 맛봐야 합니다." },
                { name: "얏록 (Yat Lok)", lat: 22.2820, lng: 114.1550, loc: "센트럴", cat: "거위구이", desc: "미슐랭 1스타. 바삭한 껍질과 육즙 가득한 거위구이 전문점입니다." },
                { name: "란퐁유엔", lat: 22.2826, lng: 114.1535, loc: "센트럴", cat: "밀크티 & 토스트", desc: "실크 스타킹 밀크티의 원조. 프렌치 토스트와 최고의 궁합을 자랑합니다." }
            ]},
            koreans: { title: "🇰🇷 한국인 필수 코스 & 핫플", color: "#3498db", items: [
                { name: "성림거 (Sing Lum Khui)", lat: 22.2995, lng: 114.1730, loc: "침사추이", cat: "운남쌀국수", desc: "한국인 입맛 저격! 맵기와 토핑을 내 맘대로 고르는 마성의 쌀국수입니다." },
                { name: "아주르 80 (Azure 80)", lat: 22.2952, lng: 114.1668, loc: "하버시티", cat: "상하이 퀴진", desc: "270도 파노라마 하버 뷰를 감상하며 즐기는 모던 상하이 요리 명소입니다." },
                { name: "제니 베이커리", lat: 22.2965, lng: 114.1725, loc: "침사추이", cat: "마약 쿠키", desc: "입에서 사르르 녹는 부드러운 쿠키. 홍콩 여행 선물 1순위입니다." }
            ]},
            noodles: { title: "🥢 궁극의 누들 전문점", color: "#27ae60", items: [
                { name: "막스 누들 (Mak's)", lat: 22.2825, lng: 114.1545, loc: "센트럴", cat: "완탕면", desc: "100년 전통의 완탕면 명가. 꼬들한 면발과 깊은 육수가 일품입니다." },
                { name: "카우키 (Kau Kee)", lat: 22.2840, lng: 114.1520, loc: "센트럴", cat: "소고기 국수", desc: "양조위 단골집으로 유명한 곳. 진한 카레 소고기 국수를 추천합니다." }
            ]}
        };

        // --- Init Map ---
        const map = L.map('map', { zoomControl: false }).setView([22.2891, 114.1924], 13);
        L.control.zoom({ position: 'bottomright' }).addTo(map);
        L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png', { attribution: '© CartoDB' }).addTo(map);

        const markers = {};
        const iconBase = 'https://raw.githubusercontent.com/pointhi/leaflet-color-markers/master/img/marker-icon-2x-';
        const getIcon = color => L.icon({ iconUrl: `${iconBase}${color}.png`, shadowUrl: 'https://cdnjs.cloudflare.com/ajax/libs/leaflet/0.7.7/images/marker-shadow.png', iconSize: [25, 41], iconAnchor: [12, 41], popupAnchor: [1, -34], shadowSize: [41, 41] });

        L.marker([22.2891, 114.1924], { icon: getIcon('violet'), zIndexOffset: 1000 }).addTo(map).bindPopup("🏨 <b>알렉산드라 호텔</b><br>나의 베이스캠프").openPopup();

        // --- Logic ---
        let itinerary = JSON.parse(localStorage.getItem('hk_itinerary')) || [[]];
        let activeDay = 0;

        function save() { localStorage.setItem('hk_itinerary', JSON.stringify(itinerary)); }

        function renderPlanner() {
            const container = document.getElementById('planner-content');
            container.innerHTML = '';
            itinerary.forEach((day, idx) => {
                const box = document.createElement('div');
                box.className = `day-box ${idx === activeDay ? 'active' : ''}`;
                box.innerHTML = `<div class="day-head ${idx === activeDay ? 'active' : ''}" onclick="activeDay=${idx};renderPlanner()">Day ${idx + 1} <span>${idx === activeDay ? '●' : ''}</span></div><div class="day-list" data-idx="${idx}"></div>`;
                container.appendChild(box);

                const list = box.querySelector('.day-list');
                day.forEach((item, itemIdx) => {
                    const el = document.createElement('div');
                    el.className = 'plan-item';
                    el.innerHTML = `<span class="plan-item-name" onclick="focusLoc('${item.name}')">${item.name}</span><button class="plan-item-del" onclick="removeItem(${idx}, ${itemIdx})">×</button>`;
                    list.appendChild(el);
                });

                new Sortable(list, { group: 'itinerary', animation: 150, onEnd: evt => {
                    const from = parseInt(evt.from.dataset.idx);
                    const to = parseInt(evt.to.dataset.idx);
                    const [moved] = itinerary[from].splice(evt.oldIndex, 1);
                    itinerary[to].splice(evt.newIndex, 0, moved);
                    save(); renderPlanner();
                }});
            });
        }

        window.addDay = () => { itinerary.push([]); activeDay = itinerary.length - 1; save(); renderPlanner(); };
        window.removeItem = (d, i) => { itinerary[d].splice(i, 1); save(); renderPlanner(); };
        window.clearPlanner = () => { if(confirm('모든 일정을 삭제할까요?')) { itinerary = [[]]; activeDay = 0; save(); renderPlanner(); }};
        window.addItem = (item, emoji) => { itinerary[activeDay].push({ name: `${emoji} ${item.name}` }); save(); renderPlanner(); };
        window.focusLoc = name => { 
            const realName = name.replace(/[^가-힣a-zA-Z0-9\s\(\)]/g, '').trim();
            const marker = markers[realName] || Object.values(markers).find(m => name.includes(m._popup.getContent().split('<b>')[1].split('</b>')[0]));
            if (marker) { map.flyTo(marker.getLatLng(), 16); setTimeout(() => marker.openPopup(), 500); }
            if (window.innerWidth < 1024) document.getElementById('map').scrollIntoView({ behavior: 'smooth' });
        };

        // --- Render Lists ---
        const anchor = document.getElementById('lists-anchor');
        const colorMap = { tours: 'gold', tarts: 'orange', foods: 'red', koreans: 'blue', noodles: 'green' };
        const emojiMap = { tours: '📸', tarts: '🥚', foods: '🥟', koreans: '🇰🇷', noodles: '🥢' };

        Object.entries(allData).forEach(([key, group]) => {
            const h2 = document.createElement('h2'); h2.className = 'section-title'; h2.innerText = group.title; anchor.appendChild(h2);
            const grid = document.createElement('div'); grid.className = 'list-grid'; anchor.appendChild(grid);
            
            group.items.forEach(item => {
                const marker = L.marker([item.lat, item.lng], { icon: getIcon(colorMap[key]) }).addTo(map).bindPopup(`<b>${item.name}</b><br><small>${item.cat}</small><hr style="margin:5px 0;border:0;border-top:1px solid #eee">${item.desc}`);
                markers[item.name] = marker;

                const card = document.createElement('div');
                card.className = `card ${key.slice(0, -1)}`;
                card.onclick = () => focusLoc(item.name);
                card.innerHTML = `<div class="card-name">${item.name}</div><div class="card-loc">📍 ${item.loc}</div><div class="card-desc">${item.desc}</div><button class="btn-plus" onclick="event.stopPropagation();addItem(${JSON.stringify(item).replace(/"/g, '&quot;')}, '${emojiMap[key]}')">+ 추가</button>`;
                grid.appendChild(card);
            });
        });

        renderPlanner();
    </script>
</body>
</html>
